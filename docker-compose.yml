version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - reading_tracker_db_data:/var/lib/postgresql/data
    env_file:
      - ../.env
    ports:
      - "5433:5432"

  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=db # Override .env's 127.0.0.1 for Docker networking
    depends_on:
      - db
    stdin_open: true
    tty: true

volumes:
  reading_tracker_db_data:
